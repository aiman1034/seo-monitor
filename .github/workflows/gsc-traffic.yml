name: GSC Traffic Snapshot

# Manually-dispatched read-only GSC traffic report for the live front-ends
# (totalsportek.cat / .com / .tech) + .dog migration source. Prints to the run log.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: GSC traffic snapshot
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python scripts/gsc_traffic.py
