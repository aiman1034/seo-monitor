name: Submit Sitemaps

# Manually/dispatch-triggered sitemap submission to GSC for the live front-ends
# (totalsportek.cat, totalsporteks.tech). NOT on a schedule — it's run on demand
# as part of the daily workflow. Sitemap submission needs the WRITE webmasters
# scope, so it can't ride on the read-only hourly monitor.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Submit sitemaps
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python scripts/submit_sitemaps.py
