# =============================================================================
# SEO Monitor configuration
# -----------------------------------------------------------------------------
# Everything that varies between deployments lives here. To monitor a new site
# (e.g. Footybite) just add an entry under `sites` and, if you want to compare
# it against another domain for duplicate content, add a pair under
# `duplicate_compare.pairs`. No code changes required.
# =============================================================================

# Sites to monitor. `paths` are appended to https://<domain> and each is checked
# with every user-agent below.
# NOTE: `/game/<slug>` pages are dynamic (they 404 once an event ends), so the
# stable key paths monitored here are the homepage and /dmca, which exist on both
# domains. Add/replace paths freely — everything is config-driven.
#
# A path entry is either a plain string, or a mapping with a `dynamic` flag:
#   - path: /            # the homepage is a LIVE sports page whose body changes on
#     dynamic: true      #   nearly every request (scores/tokens) — exempt from
#                        #   CONTENT_CHANGE detection so it doesn't flood findings.
#   - /dmca              # plain string => dynamic: false (normalized-hash compared)
sites:
  - domain: totalsportek.tech
    gsc_property: "sc-domain:totalsportek.tech"
    paths:
      - path: /
        dynamic: true
      - /dmca
  - domain: totalsportek.bio
    gsc_property: "sc-domain:totalsportek.bio"
    paths:
      - path: /
        dynamic: true
      - /dmca

# Keywords we ultimately want to rank for. Phase 1 only records these for
# context (Search Console integration that uses them lands in Phase 2).
keywords:
  - totalsportek
  - football streams
  - live football

# Schedule for the GitHub Actions run. Standard 5-field cron, UTC.
schedule:
  cron: "0 * * * *"   # hourly, on the hour

# Alerting / detection thresholds.
thresholds:
  open_issue_on_403: true        # open a GitHub Issue when a 403 is seen
  duplicate_similarity: 0.8      # flag DUPLICATE_CONTENT (overall avg) above this
  duplicate_page_similarity: 0.9 # flag DUPLICATE_PAGE when ANY single page is
                                 # this similar across the pair (catches one
                                 # near-identical page the average would hide)
  ssl_expiry_warning_days: 14    # warn when a cert expires within N days
  latency_spike_multiplier: 2.0  # flag when response time > N x previous run

# HTTP request behaviour.
request:
  timeout_seconds: 20
  delay_seconds: 1.5             # polite delay between requests
  max_redirects: 10
  verify_ssl: true

# User-agents to test. The labels are referenced by the comparison logic, so
# keep `googlebot_desktop`, `googlebot_mobile` and `browser` present.
user_agents:
  googlebot_desktop: "Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"
  googlebot_mobile: "Mozilla/5.0 (Linux; Android 6.0.1; Nexus 5X Build/MMB29P) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"
  browser: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# Which labelled user-agents count as "Googlebot" for CRAWLER_BLOCKED detection.
crawler_user_agents:
  - googlebot_desktop
  - googlebot_mobile

# The reference (real browser) user-agent label used as the "should work"
# baseline in CRAWLER_BLOCKED detection.
browser_user_agent: browser

# Duplicate-content comparison pairs. Each pair is two domains whose matching
# paths are compared. Paths compared are the intersection of the two sites'
# `paths` lists.
duplicate_compare:
  pairs:
    - [totalsportek.tech, totalsportek.bio]

# Google Search Console (Phase 2) — the authoritative crawl/ranking signal,
# since datacenter IPs (incl. Actions runners) get 403 from these sites. Each
# site needs a `gsc_property` above. Credentials come from the env vars
# GSC_SERVICE_ACCOUNT_JSON or GSC_SERVICE_ACCOUNT_FILE (see README); without them
# the GSC collector simply no-ops.
gsc:
  enabled: true
  lookback_days: 28              # Search Analytics window (data lags ~2-3 days)
  position_drop_threshold: 5     # POSITION_DROP when avg position worsens by > this
  impressions_drop_pct: 40       # IMPRESSIONS_DROP when window impressions fall > this %

# Redirect & reinstatement tracker (Phase 5) — a SEPARATE, daily subsystem that
# tracks mirror domains WITHOUT GSC. It reads the Original URLs (column C) from a
# Google Sheet (the place you manage which domains/URLs to track — adding a site =
# adding a tab here and in the sheet), probes them, and records redirected-vs-
# reinstated state + dated history. Does NOT touch the hourly GSC monitor.
redirects:
  enabled: true
  sheet_id: "1rV87uX_3F1qpVjbCk-7jr6ryafUBLaNv6RZrGk1cCN0"
  read_method: gviz              # gviz (link-viewable CSV) | sheets_api (service acct)
  tabs:                          # one per domain; add a tab name to track a new site
    - totalsportekz.com
    - footybitez.app
    - totalsportek.li
    - totalsportek.ch
    - totalsportek.gd
    - totalsportek.cv
    - footybite.to
    - totalsportekz.app
    - footybite.app
  request:
    timeout_seconds: 15
    delay_seconds: 0.5           # per-request politeness delay
    max_redirects: 10
    max_workers: 4               # bounded concurrency
  domain_redirect_threshold: 0.6 # fraction of URLs redirecting off-domain to the
                                 # SAME host => flag DOMAIN_REDIRECTED -> host
  history_cap: 100               # max dated history entries kept per URL
  schedule:
    cron: "0 6 * * *"            # daily (separate from the hourly monitor)
